<!DOCTYPE html>
<html>
<head>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    rect { stroke: white; fill: rgb(70, 180, 98); }
    text { fill: white; font-family: sans-serif; font-size: 12px; }
  </style>
</head>
<body>
  <svg id="viz" width="600" height="600"></svg>

  <script>  
    // data sample
    const data = {
      name: "root",
      children: [
        { name: "A", value: 100 },
        { name: "B", value: 50 },
        { name: "C", value: 25 }
      ]
    };

    // hierarchy
    const root = d3.hierarchy(data)
    // overall value for resizing
      .sum(d => d.value);
    // layout coordinates (x0, y0, x1, y1)
    d3.treemap()
      .size([600, 500])
      .padding(2)
      (root);

    // draw leaves
    const svg = d3.select("#viz");

    svg.selectAll("rect")
      .data(root.leaves())
      .enter()
      .append("rect")
      .attr("x", d => d.x0)
      .attr("y", d => d.y0)
      .attr("width", d => d.x1 - d.x0)
      .attr("height", d => d.y1 - d.y0);

    // leaves labels
    svg.selectAll("text")
      .data(root.leaves())
      .enter()
      .append("text")
      .attr("x", d => d.x0 + 5)
      .attr("y", d => d.y0 + 20)
      .text(d => d.data.name);
  </script>
</body>
</html>
