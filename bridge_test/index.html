<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GH Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #333; padding: 24px; height: 100vh; display: flex; flex-direction: column;
  }
  #header { margin-bottom: 20px; flex-shrink: 0; }
  #title { font-size: 22px; font-weight: 700; color: #111; letter-spacing: -0.02em; }
  #subtitle { font-size: 14px; color: #666; margin-top: 4px; }
  #status { font-size: 11px; color: #999; margin-top: 8px; font-variant-numeric: tabular-nums; }
  
  #chart-wrap { flex: 1; min-height: 0; position: relative; }
  svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .node rect, .node circle { stroke: #fff; stroke-width: 2px; transition: opacity 0.2s; cursor: pointer; }
  .node rect:hover, .node circle:hover { opacity: 0.7; }
  .node text { pointer-events: none; }
  .parent-label { font-size: 11px; font-weight: bold; fill: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .sankey-link { fill: none; stroke-opacity: 0.3; transition: stroke-opacity 0.2s; cursor: pointer;}
  .sankey-link:hover { stroke-opacity: 0.6; }

  #tooltip {
    position: absolute; background: rgba(255,255,255,0.95); border: 1px solid #ddd;
    padding: 8px 12px; border-radius: 4px; pointer-events: none; opacity: 0;
    font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
  }
  .tt-name { font-weight: 700; color: #111; margin-bottom: 2px; }
  .tt-val { color: #555; font-size: 11px; }
</style>
</head>
<body>

<div id="header">
  <div id="title">Dashboard</div>
  <div id="subtitle">Waiting for data...</div>
  <div id="status"></div>
</div>

<div id="chart-wrap">
  <svg id="chart"></svg>
</div>

<script>
const DATA_FILE = "gh_dashboard.json";
const POLL_MS = 100;
const UNIT = "m²";
const color = d3.scaleOrdinal(d3.schemeTableau10);

let lastUpdated = null;
const svg = d3.select("#chart");
const tooltip = d3.select("body").append("div").attr("id", "tooltip");

function showTT(e, name, val, group) {
  let gText = (group && group !== "Total" && group !== name) ? `<div class="tt-val">Group: ${group}</div>` : '';
  tooltip.style("opacity", 1).html(`<div class="tt-name">${name}</div><div class="tt-val">${val.toFixed(1)} ${UNIT}</div>${gText}`);
  moveTT(e);
}
function moveTT(e) {
  let left = e.pageX + 15, top = e.pageY - 15;
  if (left + 150 > window.innerWidth) left = e.pageX - 150 - 15;
  tooltip.style("left", left + "px").style("top", top + "px");
}
function hideTT() { tooltip.style("opacity", 0); }

async function poll() {
  try {
    const res = await fetch(DATA_FILE + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();

    if (json.updated !== lastUpdated) {
      lastUpdated = json.updated;
      document.getElementById("title").textContent = json.config.title;
      document.getElementById("subtitle").textContent = json.config.subtitle;
      document.getElementById("status").textContent = "Live: " + new Date().toLocaleTimeString();
      
      const wrap = document.getElementById("chart-wrap");
      
      // FAIL-SAFE: If the window is hidden/minimized, force a 4:3 aspect ratio to prevent math corruption
      let W = wrap.clientWidth;
      let H = wrap.clientHeight;
      if (!W || !H || W < 100 || H < 100) { W = 800; H = 600; }
      
      const type = json.config.type;
      if (type === "bar") drawBarChart(json, W, H);
      else if (type === "pack") drawCirclePack(json, W, H);
      else if (type === "radial") drawRadialTree(json, W, H);
      else if (type === "sankey") drawSankey(json, W, H);
      else drawTreemap(json, W, H); 
    }
  } catch(e) {}
}

function buildHierarchy(data) {
  const hasParents = data.some(d => d.parent);
  if (!hasParents) return d3.hierarchy({ name: "Total", children: data }).sum(d => d.value).sort((a,b) => b.value - a.value);
  const childNames = new Set(data.map(d => d.name));
  const missing =[...new Set(data.map(d => d.parent).filter(Boolean))].filter(p => !childNames.has(p));
  const allNodes =[{ name: "Total", parent: null }, ...missing.map(p => ({ name: p, parent: "Total" })), ...data.map(d => ({ ...d, parent: d.parent || "Total" }))];
  return d3.stratify().id(d => d.name).parentId(d => d.parent)(allNodes).sum(d => d.value).sort((a,b) => b.value - a.value);
}

// ════════════════════════════════════════════════════════════════════════════
function drawTreemap(json, W, H) {
  svg.selectAll("*").remove(); svg.attr("width", W).attr("height", H);
  const root = buildHierarchy(json.data);
  d3.treemap().size([W, H]).paddingOuter(4).paddingTop(22).paddingInner(2).round(true)(root);
  const parents = svg.selectAll(".parent").data(root.children ||[]).enter().append("g");
  parents.append("text").attr("class", "parent-label").attr("x", d=>d.x0+4).attr("y", d=>d.y0+14).text(d=>d.data.name);
  
  const nodes = svg.selectAll(".node").data(root.leaves()).enter().append("g").attr("class", "node").attr("transform", d=>`translate(${d.x0},${d.y0})`);
  nodes.append("rect").attr("width", d=>Math.max(0, d.x1-d.x0)).attr("height", d=>Math.max(0, d.y1-d.y0)).attr("rx", 3)
    .attr("fill", d=>color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name))
    .on("mouseover", (e, d) => showTT(e, d.data.name, d.value, d.parent ? d.parent.data.name : ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  nodes.each(function(d){
    const w = d.x1-d.x0, h = d.y1-d.y0, el = d3.select(this);
    if(w>45&&h>25) el.append("text").attr("x",8).attr("y",18).style("font-size","12px").style("font-weight","600").style("fill","#fff").text(d.data.name);
    if(w>60&&h>40) el.append("text").attr("x",8).attr("y",34).style("font-size","10px").style("fill","rgba(255,255,255,0.8)").text(d.value.toFixed(1));
  });
  exportCanvas(json.config, {root, W, H}, "treemap");
}

function drawCirclePack(json, W, H) {
  svg.selectAll("*").remove(); svg.attr("width", W).attr("height", H);
  const root = buildHierarchy(json.data); d3.pack().size([W, H]).padding(3)(root);
  const nodes = svg.selectAll(".node").data(root.descendants().slice(1)).enter().append("g").attr("class", "node").attr("transform", d=>`translate(${d.x},${d.y})`);
  
  nodes.append("circle").attr("r", d=>d.r).attr("fill", d=>d.children?"rgba(235,235,235,0.7)":color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name))
    .attr("stroke", d=>d.children?"#ddd":"#fff")
    .on("mouseover", (e, d) => { if(!d.children) showTT(e, d.data.name, d.value, d.parent ? d.parent.data.name : ""); })
    .on("mousemove", moveTT).on("mouseout", hideTT);

  nodes.each(function(d){
    if(d.children||d.r<25) return; const el = d3.select(this);
    el.append("text").attr("y",-4).attr("text-anchor","middle").style("font-size","12px").style("font-weight","600").style("fill","#fff").text(d.data.name);
    if(d.r>35) el.append("text").attr("y",12).attr("text-anchor","middle").style("font-size","10px").style("fill","rgba(255,255,255,0.8)").text(d.value.toFixed(0));
  });
  exportCanvas(json.config, {root, W, H}, "pack");
}

function drawBarChart(json, W, H) {
  svg.selectAll("*").remove(); svg.attr("width", W).attr("height", H);
  const data = json.data.sort((a,b)=>b.value-a.value);
  // INCREASED LEFT MARGIN to prevent text cropping
  const margin = {top: 20, right: 80, bottom: 20, left: 160}; 
  const w = W-margin.left-margin.right, h = H-margin.top-margin.bottom;
  const x = d3.scaleLinear().domain([0,d3.max(data,d=>d.value)]).range([0,w]);
  const y = d3.scaleBand().domain(data.map(d=>d.name)).range([0,h]).padding(0.2);
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
  
  g.selectAll(".bar").data(data).enter().append("rect").attr("class","bar").attr("y", d=>y(d.name)).attr("height", y.bandwidth()).attr("x",0).attr("width", d=>x(d.value)).attr("rx",2)
    .attr("fill", d=>color(d.parent||d.name))
    .on("mouseover", (e, d) => showTT(e, d.name, d.value, d.parent))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  g.selectAll(".label-name").data(data).enter().append("text").attr("x",-10).attr("y", d=>y(d.name)+y.bandwidth()/2+4).attr("text-anchor","end").style("font-size","12px").style("font-weight","600").text(d=>d.name);
  g.selectAll(".label-val").data(data).enter().append("text").attr("x", d=>x(d.value)+10).attr("y", d=>y(d.name)+y.bandwidth()/2+4).style("font-size","11px").style("fill","#666").text(d=>d.value.toFixed(1));
  exportCanvas(json.config, {data, x, y, margin, w, h, W, H}, "bar");
}

function drawRadialTree(json, W, H) {
  svg.selectAll("*").remove(); svg.attr("width", W).attr("height", H);
  const root = buildHierarchy(json.data);
  // INCREASED TEXT CLEARANCE
  const radius = Math.min(W, H) / 2 - 100;
  d3.tree().size([2 * Math.PI, radius])(root);
  const g = svg.append("g").attr("transform", `translate(${W/2},${H/2})`);

  g.selectAll(".link").data(root.links()).enter().append("path").attr("fill", "none").attr("stroke", "#ddd").attr("stroke-width", 2)
    .attr("d", d3.linkRadial().angle(d => d.x).radius(d => d.y));

  const node = g.selectAll(".node").data(root.descendants()).enter().append("g").attr("class", "node")
    .attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);

  node.append("circle").attr("r", 6).attr("fill", d => color(d.depth === 2 ? d.parent.data.name : d.data.name)).attr("stroke", "#fff")
    .on("mouseover", (e, d) => showTT(e, d.data.name, d.value || 0, d.parent ? d.parent.data.name : ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  node.append("text").attr("dy", "0.31em").attr("x", d => d.x < Math.PI === !d.children ? 10 : -10)
    .attr("text-anchor", d => d.x < Math.PI === !d.children ? "start" : "end")
    .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
    .style("font-size", "11px").style("font-weight", d => d.children ? "bold" : "normal").text(d => d.data.name);

  exportCanvas(json.config, {root, W, H, radius}, "radial");
}

function drawSankey(json, W, H) {
  svg.selectAll("*").remove(); svg.attr("width", W).attr("height", H);
  const nodeByName = new Map();
  const nodes =[], links =[];
  json.data.forEach(d => {
    if(!d.value) return;
    const pName = (d.parent || "Total") + " "; 
    if (!nodeByName.has(pName)) { nodeByName.set(pName, {name: pName}); nodes.push(nodeByName.get(pName)); }
    if (!nodeByName.has(d.name)) { nodeByName.set(d.name, {name: d.name}); nodes.push(nodeByName.get(d.name)); }
    links.push({ source: nodeByName.get(pName), target: nodeByName.get(d.name), value: d.value });
  });

  // INCREASED RIGHT MARGIN for node text
  const sankey = d3.sankey().nodeWidth(15).nodePadding(15).extent([[10, 10],[W - 140, H - 20]]);
  const {nodes: sNodes, links: sLinks} = sankey({nodes, links});

  const g = svg.append("g");
  g.selectAll(".link").data(sLinks).enter().append("path").attr("class", "sankey-link")
    .attr("d", d3.sankeyLinkHorizontal()).attr("stroke-width", d => Math.max(1, d.width))
    .attr("stroke", d => color(d.source.name))
    .on("mouseover", (e, d) => showTT(e, d.source.name.trim() + " → " + d.target.name.trim(), d.value, ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  const node = g.selectAll(".node").data(sNodes).enter().append("g").attr("class", "node");
  node.append("rect").attr("x", d => d.x0).attr("y", d => d.y0).attr("height", d => d.y1 - d.y0).attr("width", sankey.nodeWidth())
    .attr("fill", d => color(d.name.trim())).attr("stroke", "#fff")
    .on("mouseover", (e, d) => showTT(e, d.name.trim(), d.value, ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  node.append("text").attr("x", d => d.x0 < W / 2 ? d.x1 + 6 : d.x0 - 6).attr("y", d => (d.y1 + d.y0) / 2).attr("dy", "0.35em")
    .attr("text-anchor", d => d.x0 < W / 2 ? "start" : "end")
    .style("font-size", "12px").style("font-weight", "bold").text(d => d.name.trim());

  exportCanvas(json.config, {sNodes, sLinks, W, H}, "sankey");
}

// ════════════════════════════════════════════════════════════════════════════
//  UNIVERSAL RHINO EXPORT (With Safe Zones against Clipping)
// ════════════════════════════════════════════════════════════════════════════
function exportCanvas(config, layout, type) {
  const exportW = config.w || 500;
  const scale = exportW / Math.max(layout.W, 1);
  
  const HEADER_H = 70 * scale; 
  const PADDING = 20 * scale; // Safe zone to prevent stroke clipping
  const vpH = Math.round(layout.H * scale) + HEADER_H + PADDING;
  
  const canvas = document.createElement('canvas');
  canvas.width = exportW; canvas.height = vpH;
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0, 0, exportW, vpH);

  // Titles
  ctx.shadowColor = "rgba(255,255,255,0.9)"; ctx.shadowBlur = 4;
  ctx.fillStyle = '#111'; ctx.font = `bold ${18*scale}px sans-serif`; ctx.fillText(config.title, 15*scale, 25*scale);
  ctx.fillStyle = '#666'; ctx.font = `${13*scale}px sans-serif`; ctx.fillText(config.subtitle, 15*scale, 45*scale);
  ctx.shadowBlur = 0;

  // Create a safely padded internal bounding box for D3 drawing
  const drawW = exportW - PADDING;
  const drawH = vpH - HEADER_H - PADDING;
  
  // Offset everything to start inside the safe zone
  ctx.translate(PADDING / 2, HEADER_H + PADDING / 2);

  if (type === "treemap") {
    d3.treemap().size([drawW, drawH]).paddingOuter(4*scale).paddingTop(22*scale).paddingInner(2*scale).round(true)(layout.root);
    (layout.root.children ||[]).forEach(d => { ctx.fillStyle = '#555'; ctx.font = `bold ${11*scale}px sans-serif`; ctx.fillText(d.data.name.toUpperCase(), d.x0+4*scale, d.y0+14*scale); });
    layout.root.leaves().forEach(d => {
      const w = d.x1-d.x0, h = d.y1-d.y0; if(w<=0||h<=0) return;
      ctx.fillStyle = color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name);
      ctx.beginPath(); ctx.roundRect(d.x0, d.y0, w, h, 3*scale); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*scale; ctx.stroke();
      if(w>45*scale&&h>25*scale){ ctx.fillStyle = '#fff'; ctx.font = `bold ${12*scale}px sans-serif`; ctx.fillText(d.data.name, d.x0+6*scale, d.y0+16*scale); }
      if(w>60*scale&&h>40*scale){ ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = `${10*scale}px sans-serif`; ctx.fillText(d.data.value.toFixed(1), d.x0+6*scale, d.y0+32*scale); }
    });
  } 
  else if (type === "pack") {
    d3.pack().size([drawW, drawH]).padding(3*scale)(layout.root);
    layout.root.descendants().slice(1).forEach(d => {
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fillStyle = d.children ? "rgba(235,235,235,0.7)" : color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name);
      ctx.fill(); ctx.strokeStyle = d.children ? "#ddd" : "#fff"; ctx.lineWidth = 2*scale; ctx.stroke();
      if(!d.children && d.r>25*scale){
        ctx.fillStyle = '#fff'; ctx.font = `bold ${12*scale}px sans-serif`; ctx.textAlign = "center"; ctx.fillText(d.data.name, d.x, d.y-4*scale);
        if(d.r>35*scale){ ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font=`${10*scale}px sans-serif`; ctx.fillText(d.data.value.toFixed(0), d.x, d.y+12*scale); }
      }
    });
    ctx.textAlign = "left";
  }
  else if (type === "bar") {
    ctx.translate(layout.margin.left*scale, layout.margin.top*scale);
    layout.data.forEach(d => {
      const bw = layout.x(d.value)*scale, bh = layout.y.bandwidth()*scale, by = layout.y(d.name)*scale;
      ctx.fillStyle = color(d.parent||d.name); ctx.beginPath(); ctx.roundRect(0,by,bw,bh,2*scale); ctx.fill();
      ctx.fillStyle = '#111'; ctx.font = `bold ${12*scale}px sans-serif`; ctx.textAlign = 'right'; ctx.fillText(d.name, -10*scale, by+bh/2+4*scale);
      ctx.fillStyle = '#666'; ctx.font = `${11*scale}px sans-serif`; ctx.textAlign = 'left'; ctx.fillText(d.value.toFixed(1), bw+10*scale, by+bh/2+4*scale);
    });
  }
  else if (type === "radial") {
    const radius = Math.min(drawW, drawH) / 2 - (100 * scale);
    d3.tree().size([2 * Math.PI, radius])(layout.root);
    ctx.translate(drawW/2, drawH/2);
    ctx.strokeStyle = "rgba(221,221,221,0.5)"; ctx.lineWidth = 2*scale;
    layout.root.links().forEach(link => { ctx.beginPath(); d3.linkRadial().angle(d=>d.x).radius(d=>d.y).context(ctx)(link); ctx.stroke(); });
    layout.root.descendants().forEach(d => {
      const px = d.y * Math.cos(d.x - Math.PI/2), py = d.y * Math.sin(d.x - Math.PI/2);
      ctx.beginPath(); ctx.arc(px, py, 5*scale, 0, Math.PI*2);
      ctx.fillStyle = color(d.depth === 2 ? d.parent.data.name : d.data.name); ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = scale; ctx.stroke();
      ctx.save(); ctx.translate(px, py); ctx.rotate(d.x - Math.PI/2);
      ctx.fillStyle = "#111"; ctx.font = (d.children ? "bold " : "") + `${11*scale}px sans-serif`;
      if (d.x >= Math.PI) { ctx.rotate(Math.PI); ctx.textAlign = d.children ? "start" : "end"; ctx.fillText(d.data.name, d.children ? 10*scale : -10*scale, 4*scale); } 
      else { ctx.textAlign = d.children ? "end" : "start"; ctx.fillText(d.data.name, d.children ? -10*scale : 10*scale, 4*scale); }
      ctx.restore();
    });
  }
  else if (type === "sankey") {
    const sankey = d3.sankey().nodeWidth(15 * scale).nodePadding(15 * scale).extent([[10*scale, 10*scale],[drawW - (140*scale), drawH - 20*scale]]);
    const {nodes: cNodes, links: cLinks} = sankey({nodes: layout.sNodes.map(n=>Object.assign({},n)), links: layout.sLinks.map(l=>Object.assign({},l))});
    cLinks.forEach(l => { ctx.beginPath(); d3.sankeyLinkHorizontal().context(ctx)(l); ctx.strokeStyle = color(l.source.name); ctx.globalAlpha = 0.3; ctx.lineWidth = Math.max(scale, l.width); ctx.stroke(); ctx.globalAlpha = 1.0; });
    cNodes.forEach(n => {
      ctx.fillStyle = color(n.name.trim()); ctx.fillRect(n.x0, n.y0, n.x1-n.x0, n.y1-n.y0); ctx.fillStyle = "#111"; ctx.font = `bold ${12*scale}px sans-serif`;
      if (n.x0 < drawW/2) { ctx.textAlign = "start"; ctx.fillText(n.name.trim(), n.x1 + 6*scale, (n.y0+n.y1)/2 + 4*scale); } 
      else { ctx.textAlign = "end"; ctx.fillText(n.name.trim(), n.x0 - 6*scale, (n.y0+n.y1)/2 + 4*scale); }
    });
  }

  canvas.toBlob(blob => fetch('/screenshot', { method: 'POST', body: blob }).catch(()=>{}));
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
